<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MU Sicily</title>
    <meta
      name="description"
      content="MU Sicily landing page with a cinematic gallery and Discord entry point."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main>
        <section class="hero-card">
          <div class="avatar-corner" aria-label="Featured avatar">
            <img src="./assets/avatar-portrait.png" alt="Sicily portrait avatar" />
          </div>
          <div class="hero-copy">
            <span class="hero-kicker">A quiet room. A loud entrance.</span>
            <h1>MU Sicily</h1>
            <p>We will call you..</p>
          </div>
        </section>
      </main>
    </div>

    <a class="discord-float" href="https://discord.mu-sicily.com" aria-label="Join Discord">
      <span class="discord-float__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" role="img" focusable="false">
          <path
            fill="currentColor"
            d="M20.317 4.369A19.791 19.791 0 0 0 15.885 3a13.66 13.66 0 0 0-.635 1.285 18.27 18.27 0 0 0-5.5 0A13.66 13.66 0 0 0 9.115 3a19.736 19.736 0 0 0-4.433 1.369C1.88 8.552 1.12 12.632 1.5 16.655A19.904 19.904 0 0 0 7.02 19.5a14.97 14.97 0 0 0 1.184-1.936 12.87 12.87 0 0 1-1.864-.902c.157-.115.31-.236.459-.361 3.596 1.686 7.496 1.686 11.049 0 .15.125.303.246.46.361a12.8 12.8 0 0 1-1.867.904A14.63 14.63 0 0 0 17.625 19.5a19.869 19.869 0 0 0 5.519-2.845c.447-4.662-.763-8.706-2.827-12.286ZM8.68 14.228c-1.067 0-1.943-.98-1.943-2.18 0-1.201.856-2.181 1.943-2.181 1.096 0 1.953.99 1.943 2.181 0 1.2-.857 2.18-1.943 2.18Zm6.64 0c-1.067 0-1.943-.98-1.943-2.18 0-1.201.856-2.181 1.943-2.181 1.096 0 1.953.99 1.943 2.181 0 1.2-.847 2.18-1.943 2.18Z"
          />
        </svg>
      </span>
      <span class="discord-float__copy">
        <span class="discord-float__eyebrow">Open The Gate</span>
        <strong>Join Discord</strong>
      </span>
    </a>
  </body>
</html>
